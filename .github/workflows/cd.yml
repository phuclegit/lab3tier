name: Deploy

on:
  workflow_run:
    workflows:
      - Build Docker Images
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:

      - name: Go to project
        run: |
          cd /home/osboxes/devops/deploy_lab3tier

      - name: Pull newest images
        run: |
          cd /home/osboxes/devops/deploy_lab3tier
          docker compose -f docker-compose.prod.yml pull

      - name: Restart containers
        run: |
          cd /home/osboxes/devops/deploy_lab3tier
          docker compose -f docker-compose.prod.yml up -d
      - name: Wait application
        run: |
          sleep 15
      - name: Health check
        run: |
          curl -f http://localhost/health
