version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: backend

    env_file:
      - .env

    depends_on:
      - postgres

    networks:
      - devops-network

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - devops-network

  postgres:
    image: postgres:16-alpine

    container_name: postgres

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - devops-network

volumes:

  postgres-data:

networks:

  devops-network:
